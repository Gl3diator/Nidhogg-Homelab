services:
  db:
    image: mariadb:10.11
    container_name: symfony_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: "DB_NAME"
      MARIADB_USER: "DB_USER"
      MARIADB_PASSWORD: "DB_PASSWORD"
      MARIADB_ROOT_PASSWORD: "ROOT_PASSWORD"
    volumes:
      - /srv/data/symfony-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "ROOT_PASSWORD!"]
      interval: 10s
      timeout: 5s
      retries: 10

  php:
    build:
      context: ./php
    container_name: symfony_php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - /srv/apps/Technologies-Web-2.0:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:stable-alpine
    container_name: symfony_nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - /srv/apps/Technologies-Web-2.0:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
